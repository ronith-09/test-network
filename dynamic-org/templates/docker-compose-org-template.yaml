networks:
  test:
    external: true
    name: fabric_test

services:
  __PEER_HOST__:
    container_name: __PEER_HOST__
    image: hyperledger/fabric-peer:${IMAGE_TAG:-latest}
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_test
    volumes:
      - __PEERCFG_PATH__:/etc/hyperledger/peercfg
      - __DOCKER_SOCK__:/host/var/run/docker.sock
