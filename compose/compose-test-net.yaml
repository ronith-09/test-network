      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.bank1organization.example.com
      - CORE_PEER_ADDRESS=peer0.bank1organization.example.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.bank1organization.example.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.bank1organization.example.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.bank1organization.example.com:9051
      - CORE_PEER_LOCALMSPID=Bank1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.bank1organization.example.com:9445
      - CORE_METRICS_PROVIDER=prometheus
    volumes:
      - ./docker/peercfg:/etc/hyperledger/peercfg
      - ../organizations/peerOrganizations/bank1organization.example.com/peers/peer0.bank1organization.example.com:/etc/hyperledger/fabric
      - peer0.bank1organization.example.com:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - 9051:9051
      - 9445:9445
    networks:
      - test

  peer0.bank2.example.com:
    container_name: peer0.bank2.example.com
    image: hyperledger/fabric-peer:${IMAGE_TAG:-latest}
    profiles:
      - bank2
    labels:
      service: hyperledger-fabric
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.bank2.example.com
      - CORE_PEER_ADDRESS=peer0.bank2.example.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.bank2.example.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.bank2.example.com:11051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.bank2.example.com:11051
      - CORE_PEER_LOCALMSPID=Bank2MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.bank2.example.com:9447
      - CORE_METRICS_PROVIDER=prometheus
    volumes:
      - ./docker/peercfg:/etc/hyperledger/peercfg
      - ../organizations/peerOrganizations/bank2.example.com/peers/peer0.bank2.example.com:/etc/hyperledger/fabric
      - peer0.bank2.example.com:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - 11051:11051
